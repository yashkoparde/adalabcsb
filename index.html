<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADA Lab</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.22), transparent 35%),
        linear-gradient(135deg, #0f172a, #111827, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 95%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 40px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      margin-bottom: 26px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 18px #22c55e;
    }

    h1 {
      font-size: clamp(56px, 10vw, 110px);
      font-weight: 700;
      letter-spacing: -4px;
      margin-bottom: 18px;
      background: linear-gradient(to right, #ffffff, #93c5fd, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      max-width: 780px;
      margin: 0 auto;
      font-size: 19px;
      line-height: 1.8;
      color: #94a3b8;
      margin-bottom: 50px;
    }

    .cta-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 22px;
    }

    .cta {
      min-width: 220px;
      padding: 22px 30px;
      border-radius: 24px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(14px);
      transition: 0.28s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .cta::before {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      top: -90px;
      right: -70px;
      transition: 0.35s;
    }

    .cta:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.1);
    }

    .cta:hover::before {
      transform: scale(1.25);
    }

    .cta-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      position: relative;
      z-index: 2;
    }

    .cta-desc {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.6;
      position: relative;
      z-index: 2;
    }

    .footer {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: #64748b;
      font-size: 13px;
      letter-spacing: 0.4px;
    }

    @media (max-width: 700px) {
      .container {
        padding: 24px;
      }

      .subtitle {
        font-size: 16px;
      }

      .cta {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">
    <h1>ADA Lab</h1>

    <div class="cta-group">

      <a class="cta" href="light.html">
        <div class="cta-title">☀ Light Mode</div>
        <div class="cta-desc">
          Open the classic bright Code::Blocks laboratory interface.
        </div>
      </a>

      <a class="cta" href="dark.html">
        <div class="cta-title">🌙 Dark Mode</div>
        <div class="cta-desc">
          Open the modern dark themed developer workspace.
        </div>
      </a>

      <a class="cta" href="ada-lab.pdf">
        <div class="cta-title">📄 PDF Record</div>
        <div class="cta-desc">
          Download or view the compiled ADA laboratory PDF record.
        </div>
      </a>

      <a class="cta" href="outputs.html">
        <div class="cta-title">Sample Outputs</div>
        <div class="cta-desc">
          Get the sample outputs for programs
        </div>
      </a>

    </div>

  </div>

  <div class="footer">
    Teri ADA pe hum FIDA hai
  </div>

</body>
</html>
